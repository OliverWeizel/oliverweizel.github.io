<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} &mdash; {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
  <link rel="icon" href="data:,">

  <!-- Password gate — remove this block (and password-gate.js, and the
       gate rules in style.css) when going public. -->
  <style>html.gated body{visibility:hidden}</style>
  <script>try{if(sessionStorage.getItem("site-unlocked-v1")!=="1")document.documentElement.classList.add("gated")}catch(e){}</script>
  <script src="{{ '/password-gate.js' | relative_url }}" defer></script>
  <!-- /Password gate -->
</head>

<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
  </footer>
</body>

</html>
